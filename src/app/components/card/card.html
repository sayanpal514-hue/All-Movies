<div
  class="
    cursor-pointer
    bg-[#1a1a2e]
    rounded-xl
    shadow-lg
    overflow-hidden
    flex flex-col
    w-[11rem]
    sm:w-[12rem]
    lg:w-[14rem]
    h-[22rem]
    sm:h-[24rem]
    lg:h-[24rem]
    border border-white/[0.08]
    transition-all duration-300
  "
>
  <!-- IMAGE (locked height) -->
  <div class="relative h-[70%] overflow-hidden group">
    <img
      *ngIf="item?.featured_image; else fallback"
      [src]="item.featured_image"
      class="
        absolute inset-0
        w-full h-full
        object-cover
        transition-transform duration-300 ease-out
        group-hover:scale-110
      "
      alt=""
    />

    <ng-template #fallback>
      <img
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTda4dspATpCQyJnM7oO20Pner4B7rtOkAqaQ&s"
        class="
          absolute inset-0
          w-full h-full
          object-cover
          transition-transform duration-300 ease-out
          group-hover:scale-110
        "
        alt=""
      />
    </ng-template>
  </div>

  <!-- CONTENT (locked height) -->
  <div
    class="
      h-[7rem]
      px-2 py-2
      flex  flex-wrap
      justify-between
      overflow-hidden
    "
  >
    <h6
      class="
        text-[0.90rem]
        sm:text-[1rem]
        font-semibold
        leading-snug
        line-clamp-2
        text-[#f0f0f0]
      "
    >
      {{ item.title || item.name }}
    </h6>

    <p
      class="
        h-[3rem] overflow-hidden
        text-xs
        text-[#6b6b80] m-0
      "
    >
      {{ item.categories }}
    </p>
  </div>
</div>
